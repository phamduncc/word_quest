name: word_quest
description: "Word Quest - English Word Search Game"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  hive_flutter: ^1.1.0
  go_router: ^15.1.2
  equatable: ^2.0.7
  uuid: ^4.5.1
  google_fonts: ^6.2.1
  confetti: ^0.8.0
  audioplayers: ^6.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true

  assets:
    - assets/audio/
